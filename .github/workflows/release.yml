name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip when the commit was already produced by the release bot itself.
    if: github.repository == 'Anuj7411/answerable'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so changesets can compare against previous releases.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # No explicit build step — the publish action below invokes
      # `pnpm release`, which runs `turbo run build --filter='./packages/*'`
      # under the hood. Docs (`apps/docs`) and examples are excluded
      # because they aren't published to npm and have heavier build
      # toolchains (Next.js, Nextra) that block releases unnecessarily.

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          # When changesets exist on main, open a "Version Packages" PR.
          # When that PR is merged (changesets consumed), publish to npm.
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Emit a build provenance attestation (verifiable supply-chain
          # claim signed via the `id-token: write` permission above).
          # Visible on the npm package page and verifiable at install
          # time. Was temporarily disabled for the v0.1.0 bootstrap
          # publish — re-enabled now that the packages exist on npm.
          NPM_CONFIG_PROVENANCE: 'true'

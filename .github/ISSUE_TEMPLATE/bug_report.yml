name: Bug report
description: Report something that's broken or behaving unexpectedly
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections below so we can reproduce and fix it quickly.

  - type: input
    id: package
    attributes:
      label: Package
      description: Which Answerfox package is affected?
      placeholder: "@answerfox/audit"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.0.1"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps or a link to a repo / StackBlitz that reproduces the issue.
      placeholder: |
        1. Run `npx answerfox init`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, package manager, framework versions
      render: text
    validations:
      required: true
